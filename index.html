<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kupon Makan Karyawan - Realtime</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Nunito', sans-serif; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
    @keyframes popIn { from { opacity:0; transform:scale(0.8); } to { opacity:1; transform:scale(1); } }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes neon-glow { 0%,100%{box-shadow:0 0 10px rgba(250,204,21,0.3); transform:translateY(0) scale(1);} 50%{box-shadow:0 0 30px rgba(250,204,21,0.8); transform:translateY(-8px) scale(1.02);} }
    .fade-up { animation: fadeUp 0.5s ease forwards; }
    .pop-in { animation: popIn 0.4s ease forwards; }
    .float-anim { animation: float 3s ease-in-out infinite; }
    .card-hover:hover { transform: translateY(-8px) scale(1.05); transition: 0.3s; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    body { -webkit-user-select: none; user-select: none; background: #1a8a6e; }
  </style>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto" style="background: linear-gradient(135deg, #1a8a6e 0%, #1b7a8a 50%, #1a6e5a 100%);">
   
   <div id="toast" class="fixed top-4 right-4 z-50 hidden"></div>

   <div id="page-login" class="min-h-full flex items-center justify-center p-4">
    <div class="w-full max-w-md fade-up">
     <div class="text-center mb-6">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-white/20 mb-4 float-anim"><span class="text-4xl">🍽️</span></div>
      <h1 class="text-3xl font-900 text-white drop-shadow-lg">Penukaran Kupon</h1>
      <p class="text-white/80 mt-1 font-600">HUT RSU Karina Medika</p>
     </div>
     <div class="bg-white/15 backdrop-blur-sm rounded-2xl p-6 shadow-2xl border border-white/20">
      <form id="form-login" class="space-y-4">
       <div><label class="block text-white font-700 text-sm mb-1">Nama Pegawai</label><input id="inp-nama" type="text" required placeholder="Nama lengkap" class="w-full px-4 py-3 rounded-xl bg-white/90 outline-none"></div>
       <div><label class="block text-white font-700 text-sm mb-1">NIP (6 Angka)</label><input id="inp-nip" type="text" required maxlength="6" class="w-full px-4 py-3 rounded-xl bg-white/90 text-center tracking-widest text-lg outline-none"></div>
       <button type="submit" class="w-full py-3 bg-yellow-400 text-gray-900 font-800 rounded-xl shadow-lg hover:bg-yellow-300 transition">Masuk & Pilih Menu</button>
      </form>
      <button id="btn-admin-nav" class="w-full mt-3 py-2 bg-white/10 text-white/70 font-600 rounded-xl text-sm">Admin Panel</button>
     </div>
    </div>
   </div>

   <div id="page-menu" class="min-h-full p-4 hidden">
    <div class="max-w-2xl mx-auto">
     <div class="flex items-center justify-between mb-6 fade-up">
        <button onclick="location.reload()" class="text-white/80 font-700">← Kembali</button>
        <div class="text-right text-white"><p class="font-800 text-lg" id="user-display-name"></p><p class="opacity-60 text-sm" id="user-display-nip"></p></div>
     </div>
     <div class="grid grid-cols-2 gap-4 mb-6" id="menu-grid">
      <div class="menu-card card-hover bg-white/15 backdrop-blur-sm rounded-2xl p-5 border border-white/20 text-center cursor-pointer" onclick="tukar('bakso')">
       <div class="text-5xl mb-2">🥣</div><h3 class="text-white font-800">Bakso</h3><div id="status-bakso" class="mt-3"></div>
      </div>
      <div class="menu-card card-hover bg-white/15 backdrop-blur-sm rounded-2xl p-5 border border-white/20 text-center cursor-pointer" onclick="tukar('dimsum')">
       <div class="text-5xl mb-2">🥟</div><h3 class="text-white font-800">Dimsum</h3><div id="status-dimsum" class="mt-3"></div>
      </div>
      <div class="menu-card card-hover bg-white/15 backdrop-blur-sm rounded-2xl p-5 border border-white/20 text-center cursor-pointer" onclick="tukar('es_gayung')">
       <div class="text-5xl mb-2">🥤</div><h3 class="text-white font-800">Es Gayung</h3><div id="status-es_gayung" class="mt-3"></div>
      </div>
      <div class="menu-card card-hover bg-white/15 backdrop-blur-sm rounded-2xl p-5 border border-white/20 text-center cursor-pointer" onclick="tukar('sate')">
       <div class="text-5xl mb-2">🍢</div><h3 class="text-white font-800">Sate Maranggi</h3><div id="status-sate" class="mt-3"></div>
      </div>
     </div>
    </div>
   </div>

   <div id="page-admin" class="min-h-full p-4 hidden bg-gray-900">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-6 text-white"><h2 class="text-2xl font-900">LIVE MONITORING</h2><button onclick="location.reload()" class="text-red-400">Logout</button></div>
        <div class="bg-gray-800 rounded-2xl overflow-hidden shadow-xl border border-gray-700 text-white">
            <table class="w-full text-left">
                <thead class="bg-gray-700"><tr><th class="p-4">Waktu</th><th class="p-4">Nama</th><th class="p-4">NIP</th><th class="p-4">Menu</th><th class="p-4">Aksi</th></tr></thead>
                <tbody id="admin-table-body"></tbody>
            </table>
        </div>
    </div>
   </div>

   <div id="page-admin-login" class="min-h-full flex items-center justify-center p-4 hidden">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm">
        <h2 class="text-2xl font-900 mb-4">Admin Password</h2>
        <input id="admin-pw" type="password" class="w-full p-3 border rounded-xl mb-4" placeholder="***">
        <button id="submit-admin" class="w-full py-3 bg-blue-600 text-white font-bold rounded-xl">Masuk</button>
    </div>
   </div>

  </div>

<script>
// 1. FIREBASE CONFIG (Sesuai Screenshot Anda)
const firebaseConfig = {
  databaseURL: "https://karina-13-default-rtdb.asia-southeast1.firebasedatabase.app/" 
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser = null;

// --- UTILS ---
function showPage(id) {
    document.querySelectorAll('[id^="page-"]').forEach(p => p.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}

function showToast(msg, type="success") {
    const t = document.getElementById("toast");
    t.className = `fixed top-4 right-4 z-50 p-4 rounded-xl font-bold text-white shadow-2xl ${type==='success'?'bg-green-500':'bg-red-500'}`;
    t.innerHTML = msg;
    t.classList.remove("hidden");
    setTimeout(() => t.classList.add("hidden"), 3000);
}

function playSound() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
    osc.start(); osc.stop(ctx.currentTime + 0.5);
}

// --- LOGIKA KARYAWAN ---
document.getElementById("form-login").onsubmit = (e) => {
    e.preventDefault();
    const nama = document.getElementById("inp-nama").value;
    const nip = document.getElementById("inp-nip").value;
    
    if(nip.length !== 6) return showToast("NIP harus 6 angka", "error");
    
    currentUser = { nama, nip };
    document.getElementById("user-display-name").textContent = nama;
    document.getElementById("user-display-nip").textContent = "NIP: " + nip;
    
    // Listen status kupon secara real-time untuk user ini
    db.ref('users/' + nip).on('value', snapshot => {
        const data = snapshot.val() || {};
        ['bakso','dimsum','es_gayung','sate'].forEach(m => {
            const el = document.getElementById('status-' + m);
            if(data[m]) {
                el.innerHTML = '<span class="bg-green-500 text-white px-3 py-1 rounded-full text-xs font-bold">✅ SUDAH</span>';
            } else {
                el.innerHTML = '<span class="bg-yellow-400 text-gray-900 px-3 py-1 rounded-full text-xs font-bold">TUKARKAN</span>';
            }
        });
    });
    showPage('page-menu');
};

async function tukar(menu) {
    const snap = await db.ref('users/' + currentUser.nip + '/' + menu).get();
    if(snap.exists()) return showToast("Sudah pernah ditukar!", "error");

    const waktu = new Date().toLocaleTimeString('id-ID');
    
    // Simpan status per user
    db.ref('users/' + currentUser.nip).update({
        [menu]: true,
        nama: currentUser.nama
    });

    // Kirim Log untuk Dashboard Admin (Ini yang Real-time)
    db.ref('logs').push({
        nama: currentUser.nama,
        nip: currentUser.nip,
        menu: menu,
        waktu: waktu,
        ts: firebase.database.ServerValue.TIMESTAMP
    });

    showToast("Berhasil menukar " + menu, "success");
}

// --- LOGIKA ADMIN ---
document.getElementById("btn-admin-nav").onclick = () => showPage('page-admin-login');
document.getElementById("submit-admin").onclick = () => {
    if(document.getElementById("admin-pw").value === "hutrsukm13") {
        showPage('page-admin');
        startAdminMonitor();
    } else {
        alert("Password Salah");
    }
};

function startAdminMonitor() {
    let lastCount = 0;
    db.ref('logs').orderByChild('ts').on('value', snapshot => {
        const tbody = document.getElementById("admin-table-body");
        const logs = [];
        snapshot.forEach(child => {
            logs.unshift({ id: child.key, ...child.val() });
        });

        // Suara Notif Jika Ada Data Baru
        if(logs.length > lastCount) {
            if(lastCount !== 0) {
                playSound();
                showToast("Ada Penukaran Baru!", "success");
            }
            lastCount = logs.length;
        }

        tbody.innerHTML = logs.map(l => `
            <tr class="border-b border-gray-700">
                <td class="p-4 text-xs opacity-50">${l.waktu}</td>
                <td class="p-4 font-bold text-yellow-400">${l.nama}</td>
                <td class="p-4">${l.nip}</td>
                <td class="p-4 uppercase font-black"><span class="bg-blue-600 px-2 py-1 rounded">${l.menu}</span></td>
                <td class="p-4"><button onclick="hapus('${l.id}')" class="text-red-500 text-xs">Hapus</button></td>
            </tr>
        `).join("");
    });
}

window.hapus = (id) => {
    if(confirm("Hapus data ini?")) db.ref('logs/' + id).remove();
}

lucide.createIcons();
</script>
</body>
</html>
