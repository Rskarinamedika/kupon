<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kupon Makan Karyawan - HUT RSU Karina Medika</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Nunito', sans-serif; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
    @keyframes popIn { from { opacity:0; transform:scale(0.8); } to { opacity:1; transform:scale(1); } }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes neon-glow { 0%,100%{box-shadow:0 0 10px rgba(250,204,21,0.3); transform:translateY(0) scale(1);} 50%{box-shadow:0 0 30px rgba(250,204,21,0.8); transform:translateY(-8px) scale(1.02);} }
    .fade-up { animation: fadeUp 0.5s ease forwards; }
    .pop-in { animation: popIn 0.4s ease forwards; }
    .shake { animation: shake 0.4s ease; }
    .float-anim { animation: float 3s ease-in-out infinite; }
    .card-hover { transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .card-hover:hover { transform: translateY(-8px) scale(1.05); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    .btn-press:active { transform: scale(0.95); }
    body { -webkit-user-select: none; user-select: none; }
  </style>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto" style="background: linear-gradient(135deg, #1a8a6e 0%, #1b7a8a 50%, #1a6e5a 100%);">
   
   <div id="toast" class="fixed top-4 right-4 z-50 hidden"></div>

   <div id="page-login" class="min-h-full flex items-center justify-center p-4">
    <div class="w-full max-w-md fade-up">
     <div class="text-center mb-6">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-white/20 mb-4 float-anim"><span class="text-4xl">🍽️</span></div>
      <h1 class="text-3xl font-900 text-white drop-shadow-lg">Penukaran Kupon</h1>
      <p class="text-white/80 mt-1 font-600">HUT RSU Karina Medika</p>
     </div>
     <div class="bg-white/15 backdrop-blur-sm rounded-2xl p-6 shadow-2xl border border-white/20">
      <form id="form-login" class="space-y-4">
       <div>
        <label class="block text-white font-700 text-sm mb-1"><i data-lucide="user" class="inline w-4 h-4 mr-1"></i>Nama Pegawai</label> 
        <input id="inp-nama" type="text" required placeholder="Masukkan nama lengkap" class="w-full px-4 py-3 rounded-xl bg-white/90 text-gray-800 font-600 outline-none focus:ring-2 focus:ring-yellow-400 transition">
       </div>
       <div>
        <label class="block text-white font-700 text-sm mb-1"><i data-lucide="hash" class="inline w-4 h-4 mr-1"></i>NIP (6 Angka)</label> 
        <input id="inp-nip" type="text" required placeholder="Contoh: 123456" maxlength="6" inputmode="numeric" class="w-full px-4 py-3 rounded-xl bg-white/90 text-gray-800 font-600 outline-none focus:ring-2 focus:ring-yellow-400 transition tracking-widest text-center text-lg">
        <p id="nip-error" class="text-yellow-300 text-xs mt-1 hidden font-600">⚠️ NIP harus tepat 6 angka</p>
       </div>
       <button type="submit" class="w-full py-3 bg-yellow-400 hover:bg-yellow-300 text-gray-900 font-800 rounded-xl shadow-lg btn-press flex items-center justify-center gap-2 text-lg transition">Masuk & Pilih Menu</button>
      </form>
      <button id="btn-admin" class="w-full mt-3 py-2 bg-white/10 hover:bg-white/20 text-white/70 font-600 rounded-xl text-sm transition flex items-center justify-center gap-1"><i data-lucide="shield" class="w-4 h-4"></i> Admin Panel</button>
     </div>
    </div>
   </div>

   <div id="page-menu" class="min-h-full p-4 hidden">
    <div class="max-w-2xl mx-auto">
     <div class="flex items-center justify-between mb-6 fade-up">
      <button id="btn-back-menu" class="flex items-center gap-1 text-white/80 hover:text-white font-700 transition btn-press"><i data-lucide="arrow-left" class="w-5 h-5"></i> Keluar</button>
      <div class="text-right text-white">
       <p class="font-800 text-lg" id="user-display-name"></p>
       <p class="opacity-60 text-sm" id="user-display-nip"></p>
      </div>
     </div>
     <h2 class="text-2xl font-900 text-white text-center mb-6 fade-up">🎫 Pilih Kupon Menu</h2>
     <div class="grid grid-cols-2 gap-4 mb-6" id="menu-grid">
      <div class="menu-card card-hover bg-white/15 backdrop-blur-sm rounded-2xl p-5 border border-white/20 text-center cursor-pointer" data-menu="bakso">
       <div class="text-5xl mb-2">🥣</div>
       <h3 class="text-white font-800">Bakso</h3>
       <div class="mt-3 status-badge"></div>
      </div>
      <div class="menu-card card-hover bg-white/15 backdrop-blur-sm rounded-2xl p-5 border border-white/20 text-center cursor-pointer" data-menu="dimsum">
       <div class="text-5xl mb-2">🥟</div>
       <h3 class="text-white font-800">Dimsum</h3>
       <div class="mt-3 status-badge"></div>
      </div>
      <div class="menu-card card-hover bg-white/15 backdrop-blur-sm rounded-2xl p-5 border border-white/20 text-center cursor-pointer" data-menu="es_gayung">
       <div class="text-5xl mb-2">🥤</div>
       <h3 class="text-white font-800">Es Gayung</h3>
       <div class="mt-3 status-badge"></div>
      </div>
      <div class="menu-card card-hover bg-white/15 backdrop-blur-sm rounded-2xl p-5 border border-white/20 text-center cursor-pointer" data-menu="sate_maranggi_ketan">
       <div class="text-5xl mb-2">🍢</div>
       <h3 class="text-white font-800">Sate Maranggi</h3>
       <div class="mt-3 status-badge"></div>
      </div>
     </div>
    </div>
   </div>

   <div id="page-admin-login" class="min-h-full flex items-center justify-center p-4 hidden">
    <div class="w-full max-w-sm fade-up">
     <div class="bg-white/15 backdrop-blur-sm rounded-2xl p-6 border border-white/20 text-center">
      <i data-lucide="shield-check" class="w-12 h-12 text-white mx-auto mb-4"></i>
      <h2 class="text-2xl font-900 text-white mb-4">Admin Access</h2>
      <input id="inp-admin-pw" type="password" placeholder="Password Admin" class="w-full px-4 py-3 rounded-xl mb-4 outline-none">
      <button id="submit-admin-login" class="w-full py-3 bg-yellow-400 font-800 rounded-xl mb-2">Masuk</button>
      <button id="btn-back-admin-login" class="text-white/60 text-sm">Kembali</button>
     </div>
    </div>
   </div>

   <div id="page-admin" class="min-h-full p-4 hidden">
    <div class="max-w-4xl mx-auto">
     <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-900 text-white">Admin Dashboard</h2>
        <button id="btn-logout-admin" class="bg-red-500 text-white px-4 py-2 rounded-lg font-bold">Keluar</button>
     </div>
     <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6" id="stats-grid"></div>
     <div class="bg-white rounded-2xl overflow-hidden text-gray-800">
        <table class="w-full text-left">
            <thead class="bg-gray-100 font-bold">
                <tr>
                    <th class="p-4">Nama</th>
                    <th class="p-4">NIP</th>
                    <th class="p-4 text-center">🥣</th>
                    <th class="p-4 text-center">🥟</th>
                    <th class="p-4 text-center">🥤</th>
                    <th class="p-4 text-center">🍢</th>
                    <th class="p-4">Aksi</th>
                </tr>
            </thead>
            <tbody id="admin-table-body"></tbody>
        </table>
     </div>
    </div>
   </div>

  </div>

<script>
// --- CONFIGURATION ---
const ADMIN_PASSWORD = "hutrsukm13";
const STORAGE_KEY = "rsu_karina_coupons";

// --- DATA ENGINE (LOKAL STORAGE) ---
let allRecords = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

function saveData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(allRecords));
    renderAdmin();
}

// --- CORE LOGIC ---
let currentUser = null;

function showPage(id) {
    document.querySelectorAll('[id^="page-"]').forEach(p => p.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}

// Toast
function showToast(msg, type="success") {
    const t = document.getElementById("toast");
    const colors = { success:"bg-green-500", error:"bg-red-500", warning:"bg-yellow-500 text-gray-900" };
    t.innerHTML = `<div class="p-4 rounded-xl shadow-xl font-bold text-white ${colors[type]}">${msg}</div>`;
    t.classList.remove("hidden");
    setTimeout(() => t.classList.add("hidden"), 3000);
}

// Sound
function playSound() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.2);
    } catch(e) {}
}

// Login
document.getElementById("form-login").addEventListener("submit", e => {
    e.preventDefault();
    const nama = document.getElementById("inp-nama").value;
    const nip = document.getElementById("inp-nip").value;

    if(nip.length !== 6) return showToast("NIP harus 6 angka", "warning");

    const existing = allRecords.find(r => r.nip === nip);
    
    // Validasi jika sudah menukar semua
    if (existing && existing.bakso && existing.dimsum && existing.es_gayung && existing.sate_maranggi_ketan) {
        return showToast("Anda sudah menukar semua kupon!", "warning");
    }

    currentUser = { nama, nip, record: existing || null };
    document.getElementById("user-display-name").textContent = nama;
    document.getElementById("user-display-nip").textContent = "NIP: " + nip;
    
    renderMenuCards();
    showPage("page-menu");
});

// Render Menu
function renderMenuCards() {
    const record = allRecords.find(r => r.nip === currentUser.nip);
    document.querySelectorAll("[data-menu]").forEach(card => {
        const menu = card.dataset.menu;
        const redeemed = record && record[menu];
        const badge = card.querySelector(".status-badge");
        
        if (redeemed) {
            badge.innerHTML = `<span class="bg-green-500/20 text-green-300 px-3 py-1 rounded-full text-xs">✅ Sudah</span>`;
            card.style.opacity = "0.5";
        } else {
            badge.innerHTML = `<span class="bg-yellow-400 text-gray-900 px-3 py-1 rounded-full text-xs font-bold">Tukarkan</span>`;
            card.style.opacity = "1";
        }
    });
}

// Handle Click Menu
document.querySelectorAll("[data-menu]").forEach(card => {
    card.addEventListener("click", () => {
        const menu = card.dataset.menu;
        let record = allRecords.find(r => r.nip === currentUser.nip);

        if (record && record[menu]) return showToast("Sudah pernah ditukar", "warning");

        if (!record) {
            record = { 
                id: Date.now(), 
                nama: currentUser.nama, 
                nip: currentUser.nip,
                bakso: false, dimsum: false, es_gayung: false, sate_maranggi_ketan: false,
                time: new Date().toLocaleString()
            };
            allRecords.push(record);
        }

        record[menu] = true;
        saveData();
        playSound();
        showToast("Kupon " + menu + " Berhasil!", "success");
        renderMenuCards();
    });
});

// Admin Logic
document.getElementById("btn-admin").onclick = () => showPage("page-admin-login");
document.getElementById("btn-back-admin-login").onclick = () => showPage("page-login");
document.getElementById("btn-logout-admin").onclick = () => showPage("page-login");
document.getElementById("btn-back-menu").onclick = () => showPage("page-login");

document.getElementById("submit-admin-login").onclick = () => {
    if(document.getElementById("inp-admin-pw").value === ADMIN_PASSWORD) {
        renderAdmin();
        showPage("page-admin");
    } else {
        showToast("Password Salah", "error");
    }
};

function renderAdmin() {
    const tbody = document.getElementById("admin-table-body");
    tbody.innerHTML = allRecords.map(r => `
        <tr class="border-b">
            <td class="p-4 font-bold">${r.nama}</td>
            <td class="p-4">${r.nip}</td>
            <td class="p-4 text-center">${r.bakso ? '✅' : '-'}</td>
            <td class="p-4 text-center">${r.dimsum ? '✅' : '-'}</td>
            <td class="p-4 text-center">${r.es_gayung ? '✅' : '-'}</td>
            <td class="p-4 text-center">${r.sate_maranggi_ketan ? '✅' : '-'}</td>
            <td class="p-4"><button onclick="deleteData(${r.id})" class="text-red-500">Hapus</button></td>
        </tr>
    `).join("");

    const stats = {
        total: allRecords.length,
        bakso: allRecords.filter(r => r.bakso).length,
        dimsum: allRecords.filter(r => r.dimsum).length,
        es: allRecords.filter(r => r.es_gayung).length,
        sate: allRecords.filter(r => r.sate_maranggi_ketan).length
    };
    
    document.getElementById("stats-grid").innerHTML = `
        <div class="bg-white/20 p-4 rounded-xl text-white text-center">
            <p class="text-xs">Total User</p>
            <p class="text-2xl font-black">${stats.total}</p>
        </div>
        <div class="bg-white/20 p-4 rounded-xl text-white text-center">
            <p class="text-xs">Bakso</p>
            <p class="text-2xl font-black">${stats.bakso}</p>
        </div>
        <div class="bg-white/20 p-4 rounded-xl text-white text-center">
            <p class="text-xs">Dimsum</p>
            <p class="text-2xl font-black">${stats.dimsum}</p>
        </div>
        <div class="bg-white/20 p-4 rounded-xl text-white text-center">
            <p class="text-xs">Es Gayung</p>
            <p class="text-2xl font-black">${stats.es}</p>
        </div>
    `;
}

window.deleteData = (id) => {
    if(confirm("Hapus data ini?")) {
        allRecords = allRecords.filter(r => r.id !== id);
        saveData();
    }
};

lucide.createIcons();
</script>
</body>
</html>
